<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKA Global v6</title>

<style>
:root{
--bg:#fff;--card:#f3f4f6;--text:#111;--accent:#2563eb;--border:#e5e7eb
}
.dark{
--bg:#09090b;--card:#18181b;--text:#fafafa;--accent:#3b82f6;--border:#27272a
}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.app{max-width:520px;margin:auto;padding-bottom:100px}
header{padding:15px;display:flex;justify-content:space-between}
.card{background:var(--card);padding:14px;border-radius:16px;margin-bottom:12px;border:1px solid var(--border)}
.btn{width:100%;padding:12px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
nav{position:fixed;bottom:0;width:100%;max-width:520px;display:flex;background:var(--card);border-top:1px solid var(--border)}
nav button{flex:1;border:none;background:none;padding:10px}
input{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border)}
</style>
</head>

<body class="dark">

<div class="app">
<header>
<b>MARKA</b>
<div id="balance"></div>
</header>

<main id="view"></main>

<nav>
<button onclick="App.nav('home')">🏠</button>
<button onclick="App.nav('market')">🛍️</button>
<button onclick="App.nav('services')">💼</button>
<button onclick="App.nav('feed')">🎥</button>
<button onclick="App.nav('wallet')">💳</button>
</nav>
</div>

<script type="module">

// ================= STORE =================
const Store = (()=>{

let s = JSON.parse(localStorage.getItem("marka_v6")||"null");

if(!s){
s={
view:"home",
user:{name:"Alex",balance:25000,kyc:"KYC1",strikes:0},
users:[
{id:"u1",name:"Carlos",score:300},
{id:"u2",name:"Ana",score:120},
{id:"u3",name:"João UX",score:500}
],
products:[
{id:"p1",type:"car",name:"Toyota Prado",price:20000000,seller:"u1"},
{id:"p2",type:"food",name:"Pizza",price:5000,seller:"u2"}
],
services:[
{id:"s1",name:"UI Design",price:120000,user:"u3"}
],
feed:[
{user:"Ana",likes:4},
{user:"Carlos",likes:2}
],
chat:[],
escrow:[],
ledger:[],
queue:[]
};
}

function set(fn){
fn(s);
localStorage.setItem("marka_v6",JSON.stringify(s));
render();
}

function get(){return s;}

return{get,set};
})();

// ================= FRAUD =================
const Fraud={
check(msg){
let rules=[/\d{9,}/,/@/,/http/i,/whatsapp/i];
if(rules.some(r=>r.test(msg))){
Store.set(s=>{
s.user.strikes++;
s.queue.push({msg,type:"LEAK"});
});
return true;
}
return false;
}
};

// ================= ESCROW =================
const Escrow={
create(amount,seller){
Store.set(s=>{
s.user.balance-=amount;
s.escrow.push({
id:crypto.randomUUID(),
amount,seller,status:"HOLD"
});
});
alert("Escrow ativo");
},
release(id){
Store.set(s=>{
let tx=s.escrow.find(x=>x.id===id);
if(!tx)return;
let fee=tx.amount*0.1;
s.ledger.push({amount:tx.amount-fee});
tx.status="DONE";
});
alert("Pagamento libertado");
}
};

// ================= HELPERS =================
const H={
user(id){return Store.get().users.find(u=>u.id===id)},
userCard(u){
return `<div class="card"><b>${u.name}</b><p>Score ${u.score}</p></div>`;
}
};

// ================= UI =================
const UI={

home(s){
return `
<div class="card">Olá ${s.user.name}<br>${s.user.balance} Kz</div>

<div class="grid">
<div class="card" onclick="App.nav('market')">Marketplace</div>
<div class="card" onclick="App.nav('services')">Freelance</div>
<div class="card" onclick="App.nav('feed')">Feed</div>
<div class="card" onclick="App.nav('ranking')">Ranking</div>
<div class="card" onclick="App.nav('chat')">Chat</div>
</div>`;
},

market(s){
return s.products.map(p=>{
let u=H.user(p.seller);
return `<div class="card">
<b>${p.name}</b>
<p>${p.price.toLocaleString()} Kz</p>
${H.userCard(u)}
<button class="btn" onclick="App.buy('${p.id}')">Comprar</button>
</div>`;
}).join("");
},

services(s){
return s.services.map(x=>{
let u=H.user(x.user);
return `<div class="card">
<b>${x.name}</b>
<p>${x.price}</p>
${H.userCard(u)}
<button class="btn" onclick="App.propose('${x.id}')">Propor</button>
</div>`;
}).join("");
},

feed(s){
return s.feed.map((f,i)=>`
<div class="card">
${f.user}
<button class="btn" onclick="App.like(${i})">❤️ ${f.likes}</button>
</div>`).join("");
},

chat(s){
return `
<div class="card">${s.chat.map(m=>`<p>${m}</p>`).join("")}</div>
<input id="msg">
<button class="btn" onclick="App.send()">Enviar</button>`;
},

wallet(s){
return `
<div class="card">${s.user.balance} Kz</div>
<button class="btn" onclick="App.add()">+1000</button>`;
},

ranking(s){
return s.users.sort((a,b)=>b.score-a.score)
.map(u=>`<div class="card">${u.name} ${u.score}</div>`).join("");
}

};

// ================= APP =================
window.App={

nav(v){Store.set(s=>s.view=v)},

buy(id){
let s=Store.get();
let p=s.products.find(x=>x.id===id);
if(s.user.balance<p.price)return alert("Saldo insuficiente");
Escrow.create(p.price,p.seller);
},

propose(id){
alert("Proposta enviada");
},

send(){
let msg=document.getElementById("msg").value;
if(Fraud.check(msg)) return alert("Mensagem bloqueada");
Store.set(s=>s.chat.push(msg));
},

add(){
Store.set(s=>s.user.balance+=1000);
},

like(i){
Store.set(s=>{
s.feed[i].likes++;
s.users[0].score+=2;
});
}

};

// ================= RENDER =================
function render(){
let s=Store.get();
document.getElementById("balance").innerText=s.user.balance+" Kz";

let html = UI[s.view] ? UI[s.view](s) : UI.home(s);

document.getElementById("view").innerHTML=html;
}

// INIT
render();

</script>

</body>
</html>
