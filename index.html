    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    const CACHE_NAME = 'marka-v3-cache';
                    const urlsToCache = ['/'];
                    self.addEventListener('install', event => {
                        event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                    });
                    self.addEventListener('fetch', event => {
                        event.respondWith(caches.match(event.request).then(response => response || fetch(event.request)));
                    });
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => console.log('SW failed', err));
            });
        }
    </script>

    <script type="module">
        // --- Core State Management (Zustand-like) ---
        const createStore = (initialState) => {
            let state = initialState;
            const listeners = new Set();
            return {
                getState: () => state,
                setState: (fn) => {
                    state = typeof fn === 'function' ? fn(state) : fn;
                    listeners.forEach(l => l(state));
                },
                subscribe: (l) => {
                    listeners.add(l);
                    return () => listeners.delete(l);
                }
            };
        };

        const store = createStore({
            user: JSON.parse(localStorage.getItem('marka_user')) || {
                id: 'u1',
                handle: 'premium_user',
                balance: 150000,
                xp: 1250,
                tier: 'Gold',
                kyc: 'Yellow',
                interactions: {},

            cart: [],

            lang: 'pt',
            view: 'home'
