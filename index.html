<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKA | Global Super-App</title>
    
    <!-- Premium Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        premium: {
                            black: '#050505',
                            dark: '#0F0F0F',
                            card: '#161616',
                            accent: '#3B82F6',
                            gold: '#D4AF37'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .light .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { color: #3B82F6; transform: translateY(-2px); }
        .btn-press:active { transform: scale(0.95); }
        .map-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 30px 30px; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Centered Branding Overlay */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .branding-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 4rem;
            letter-spacing: 0.3em;
            color: #3B82F6;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-premium-black text-white font-sans transition-colors duration-500 dark">

    <!-- Splash Screen / Centered Branding -->
    <div id="splash-screen">
        <div class="branding-text">MARKA</div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative bg-premium-black dark:bg-premium-black light:bg-gray-50 overflow-hidden opacity-0 transition-opacity duration-1000">
        
        <!-- Header -->
        <header class="glass sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
            <button id="lang-toggle" class="btn-press px-3 py-1 rounded-full bg-white/5 text-[10px] font-bold uppercase tracking-widest">
                PT
            </button>
            
            <div class="absolute left-1/2 -translate-x-1/2">
                <h1 class="font-display font-extrabold text-xl tracking-[0.2em] text-premium-accent">MARKA</h1>
            </div>

            <button id="theme-toggle" class="btn-press p-2 rounded-full hover:bg-white/5">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Dynamic Content -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-32">
            <!-- Content injected by JS -->
        </main>

        <!-- Bottom Nav -->
        <nav class="glass fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 px-8 py-4 flex justify-between items-center border-t border-white/5">
            <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1" data-path="home">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="nav-label text-[9px] font-bold uppercase tracking-widest" data-key="nav_home">Início</span>
            </button>
            <button onclick="router.navigate('market')" class="nav-item flex flex-col items-center gap-1 text-gray-500" data-path="market">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                <span class="nav-label text-[9px] font-bold uppercase tracking-widest" data-key="nav_market">Market</span>
            </button>
            <button onclick="router.navigate('wallet')" class="nav-item flex flex-col items-center gap-1 text-gray-500" data-path="wallet">
                <i data-lucide="wallet" class="w-6 h-6"></i>
                <span class="nav-label text-[9px] font-bold uppercase tracking-widest" data-key="nav_pay">Pagar</span>
            </button>
            <button onclick="router.navigate('profile')" class="nav-item flex flex-col items-center gap-1 text-gray-500" data-path="profile">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="nav-label text-[9px] font-bold uppercase tracking-widest" data-key="nav_me">Eu</span>
            </button>
        </nav>

        <!-- Global Modal -->
        <div id="modal-container" class="fixed inset-0 z-[100] hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="ui.closeModal()"></div>
            <div id="modal-content" class="absolute bottom-0 left-0 right-0 max-w-md mx-auto glass rounded-t-[32px] p-8 animate-fade-in"></div>
        </div>

        <!-- Toast -->
        <div id="toast-container" class="fixed top-24 left-0 right-0 z-[110] px-6 pointer-events-none"></div>
    </div>

    <script type="module">
        // --- Translations ---
        const i18n = {
            pt: {
                nav_home: "Início", nav_market: "Market", nav_pay: "Pagar", nav_me: "Eu",
                balance: "Saldo Total", load: "CARREGAR", send: "ENVIAR", highlights: "Destaques",
                welcome: "Bem-vindo à MARKA", buy: "Comprar", confirm: "Confirmar",
                powered: "Powered by Magestade Pura Digital", rights: "Todos os direitos reservados",
                faq_title: "Perguntas Frequentes", back: "VOLTAR",
                search: "Pesquisar...", insufficient: "Saldo insuficiente",
                success_buy: "Pagamento processado! Produto em trânsito."
            },
            en: {
                nav_home: "Home", nav_market: "Market", nav_pay: "Pay", nav_me: "Me",
                balance: "Total Balance", load: "LOAD", send: "SEND", highlights: "Highlights",
                welcome: "Welcome to MARKA", buy: "Buy", confirm: "Confirm",
                powered: "Powered by Magestade Pura Digital", rights: "All rights reserved",
                faq_title: "Frequently Asked Questions", back: "BACK",
                search: "Search...", insufficient: "Insufficient balance",
                success_buy: "Payment processed! Product in transit."
            },
            osh: {
                nav_home: "Eumbo", nav_market: "Omatala", nav_pay: "Futa", nav_me: "Aame",
                balance: "Oimaliwa aishe", load: "TULA MO", send: "TUMA", highlights: "Oipopiwa",
                welcome: "Tambula ko ku MARKA", buy: "Landa", confirm: "Koleka",
                powered: "Powered by Magestade Pura Digital", rights: "Oufemba aushe owa tulwa po",
                faq_title: "Omapulo e na ondunge", back: "SHUNA",
                search: "Konga...", insufficient: "Oimaliwa inai wana",
                success_buy: "Efuto la pwa! Oshinima oshi li mondjila."
            }
        };

        // --- State ---
        const state = {
            lang: 'pt',
            theme: 'dark',
            view: 'home',
            user: { balance: 500000, handle: 'Premium User' },
            products: [
                { id: 1, title: 'iPhone 15 Pro', price: 950000, img: 'https://picsum.photos/seed/p1/400/400' },
                { id: 2, title: 'Mercedes G63', price: 85000000, img: 'https://picsum.photos/seed/p2/400/400' },
                { id: 3, title: 'Penthouse', price: 120000000, img: 'https://picsum.photos/seed/p3/400/400' },
                { id: 4, title: 'Rolex', price: 12500000, img: 'https://picsum.photos/seed/p4/400/400' }
            ]
        };

        // --- Core Logic ---
        window.router = {
            navigate: (view) => {
                state.view = view;
                render();
                window.scrollTo(0, 0);
            }
        };

        window.ui = {
            notify: (msg, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `glass p-4 rounded-2xl mb-3 shadow-2xl border-l-4 ${type === 'success' ? 'border-green-500' : 'border-blue-500'} flex items-center gap-3 animate-fade-in pointer-events-auto`;
                toast.innerHTML = `<i data-lucide="info" class="w-5 h-5 ${type === 'success' ? 'text-green-500' : 'text-blue-500'}"></i><p class="text-sm font-bold">${msg}</p>`;
                container.appendChild(toast);
                lucide.createIcons();
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
            },
            openModal: (content) => {
                const container = document.getElementById('modal-container');
                const inner = document.getElementById('modal-content');
                inner.innerHTML = content;
                container.classList.remove('hidden');
                lucide.createIcons();
            },
            closeModal: () => document.getElementById('modal-container').classList.add('hidden'),
            toggleLang: () => {
                const langs = ['pt', 'en', 'osh'];
                const idx = (langs.indexOf(state.lang) + 1) % langs.length;
                state.lang = langs[idx];
                document.getElementById('lang-toggle').innerText = state.lang.toUpperCase();
                render();
            },
            toggleTheme: () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                document.body.classList.toggle('dark', state.theme === 'dark');
                document.body.classList.toggle('light', state.theme === 'light');
                document.getElementById('theme-icon').setAttribute('data-lucide', state.theme === 'dark' ? 'moon' : 'sun');
                lucide.createIcons();
            }
        };

        window.actions = {
            buy: (id) => {
                const p = state.products.find(x => x.id === id);
                if (state.user.balance < p.price) return ui.notify(i18n[state.lang].insufficient, 'error');
                ui.openModal(`
                    <div class="text-center">
                        <h3 class="text-xl font-bold mb-4">${i18n[state.lang].confirm} ${p.title}</h3>
                        <p class="text-gray-400 text-sm mb-6">${p.price.toLocaleString()} Kz</p>
                        <button onclick="actions.confirmBuy(${id})" class="w-full py-4 bg-premium-accent rounded-2xl font-bold btn-press">${i18n[state.lang].buy}</button>
                    </div>
                `);
            },
            confirmBuy: (id) => {
                const p = state.products.find(x => x.id === id);
                state.user.balance -= p.price;
                ui.closeModal();
                ui.notify(i18n[state.lang].success_buy);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                render();
            }
        };

        // --- Views ---
        // --- Dynamic Data ---
        const modules = {
            restaurants: [
                { name: 'KFC Luanda', rating: 4.8, time: '20-30 min', img: 'https://picsum.photos/seed/kfc/800/400' },
                { name: 'Pizzaria Veneza', rating: 4.5, time: '35-45 min', img: 'https://picsum.photos/seed/pizza/800/400' }
            ],
            jobs: [
                { title: 'UI/UX Designer', budget: 250000, proposals: 12 },
                { title: 'React Developer', budget: 500000, proposals: 8 }
            ],
            flights: [
                { from: 'LAD', to: 'LIS', price: 450000, time: '6h 30m' },
                { from: 'LAD', to: 'NYC', price: 850000, time: '10h 15m' }
            ]
        };

        const Views = {
            home: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <div class="glass p-8 rounded-[32px] mb-8 relative overflow-hidden bg-gradient-to-br from-premium-accent/10 to-transparent">
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2">${i18n[state.lang].balance}</p>
                        <h2 class="text-4xl font-display font-bold mb-6">${state.user.balance.toLocaleString()} Kz</h2>
                        <div class="flex gap-3">
                            <button onclick="ui.notify('Deposit feature coming soon')" class="flex-1 py-3 bg-white text-black rounded-xl font-bold text-xs btn-press">${i18n[state.lang].load}</button>
                            <button onclick="router.navigate('wallet')" class="flex-1 py-3 bg-premium-accent text-white rounded-xl font-bold text-xs btn-press">${i18n[state.lang].send}</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-y-6 gap-x-4 mb-8">
                        ${[
                            { id: 'market', icon: 'shopping-bag', label: 'Market' },
                            { id: 'transport', icon: 'car', label: 'Uber' },
                            { id: 'food', icon: 'utensils', label: 'Food' },
                            { id: 'travel', icon: 'plane', label: 'Travel' },
                            { id: 'freelance', icon: 'briefcase', label: 'Jobs' },
                            { id: 'bills', icon: 'zap', label: 'Bills' },
                            { id: 'clothing', icon: 'shirt', label: 'Fashion' },
                            { id: 'social', icon: 'video', label: 'Social' },
                            { id: 'leaderboard', icon: 'trophy', label: 'Ranking' },
                            { id: 'gamification', icon: 'target', label: 'Missions' },
                            { id: 'creator', icon: 'camera', label: 'Studio' },
                            { id: 'kyc', icon: 'user-check', label: 'KYC' },
                            { id: 'escrow', icon: 'lock', label: 'Escrow' },
                            { id: 'antifraud', icon: 'shield-check', label: 'Security' },
                            { id: 'admin', icon: 'settings', label: 'Admin' },
                            { id: 'faq', icon: 'help-circle', label: 'FAQ' }
                        ].map(m => `
                            <button onclick="router.navigate('${m.id}')" class="flex flex-col items-center gap-2 btn-press">
                                <div class="w-14 h-14 glass rounded-2xl flex items-center justify-center shadow-xl">
                                    <i data-lucide="${m.icon}" class="w-6 h-6"></i>
                                </div>
                                <span class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">${m.label}</span>
                            </button>
                        `).join('')}
                    </div>
                    <h3 class="font-display font-bold text-xl mb-4">${i18n[state.lang].highlights}</h3>
                    <div class="grid grid-cols-2 gap-4">
                        ${state.products.map(p => `
                            <div class="glass rounded-3xl overflow-hidden border border-white/5 btn-press" onclick="actions.buy(${p.id})">
                                <img src="${p.img}" class="w-full h-32 object-cover">
                                <div class="p-4">
                                    <h4 class="text-xs font-bold truncate">${p.title}</h4>
                                    <p class="text-premium-accent font-bold text-sm mt-1">${p.price.toLocaleString()} Kz</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            market: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">${i18n[state.lang].nav_market}</h2>
                    <div class="space-y-4">
                        ${state.products.map(p => `
                            <div class="glass p-4 rounded-3xl flex gap-4 items-center border border-white/5 btn-press" onclick="actions.buy(${p.id})">
                                <img src="${p.img}" class="w-20 h-20 rounded-2xl object-cover">
                                <div class="flex-1">
                                    <h4 class="font-bold text-sm">${p.title}</h4>
                                    <p class="text-premium-accent font-bold text-sm">${p.price.toLocaleString()} Kz</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-700"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            wallet: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">${i18n[state.lang].nav_pay}</h2>
                    <div class="glass p-8 rounded-[32px] bg-premium-accent mb-8">
                        <p class="text-white/60 text-xs font-bold uppercase mb-1">${i18n[state.lang].balance}</p>
                        <h2 class="text-4xl font-display font-bold text-white">${state.user.balance.toLocaleString()} Kz</h2>
                    </div>
                    <div class="space-y-3">
                        ${[1,2,3].map(i => `
                            <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i data-lucide="arrow-down-left" class="w-5 h-5 text-green-500"></i></div>
                                    <div><p class="text-sm font-bold">Transfer</p><p class="text-[10px] text-gray-500">Today</p></div>
                                </div>
                                <p class="font-bold text-green-500">+50.000 Kz</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            profile: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <div class="flex flex-col items-center mb-8">
                        <div class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-premium-accent to-purple-500 mb-4">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marka" class="w-full h-full rounded-full bg-premium-dark">
                        </div>
                        <h2 class="text-2xl font-display font-bold">${state.user.handle}</h2>
                    </div>
                    <div class="space-y-2 mb-12">
                        <button onclick="ui.notify('FAQ coming soon')" class="w-full glass p-5 rounded-2xl flex justify-between items-center btn-press">
                            <span class="font-bold text-sm">${i18n[state.lang].faq_title}</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-700"></i>
                        </button>
                    </div>
                    <div class="text-center opacity-40 space-y-2">
                        <p class="text-[10px] font-bold uppercase tracking-widest">© 2026 MARKA GLOBAL</p>
                        <p class="text-[9px] font-medium">${i18n[state.lang].rights}</p>
                        <p class="text-[11px] font-extrabold text-premium-accent tracking-tighter">${i18n[state.lang].powered}</p>
                    </div>
                </div>
            `,
            food: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">Food Delivery</h2>
                    <div class="space-y-4">
                        ${modules.restaurants.map(r => `
                            <div class="glass p-5 rounded-3xl border border-white/5 btn-press" onclick="ui.notify('${r.name} added to cart!')">
                                <img src="${r.img}" class="w-full h-32 rounded-2xl object-cover mb-3">
                                <div class="flex justify-between items-start">
                                    <div><h4 class="font-bold text-sm">${r.name}</h4><p class="text-[10px] text-gray-500">${r.time}</p></div>
                                    <span class="text-premium-accent font-bold">★ ${r.rating}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            transport: () => `
                <div class="h-[calc(100vh-200px)] flex flex-col animate-fade-in">
                    <div class="flex-1 map-bg relative"><div class="absolute inset-0 flex items-center justify-center"><div class="w-4 h-4 bg-premium-accent rounded-full shadow-[0_0_20px_rgba(59,130,246,0.8)]"></div></div></div>
                    <div class="glass p-8 rounded-t-[40px] -mt-10 relative z-10">
                        <h3 class="text-xl font-bold mb-6">Request a Ride</h3>
                        <button onclick="ui.notify('Finding drivers...')" class="w-full py-4 bg-premium-accent rounded-2xl font-bold btn-press">Book Ride</button>
                    </div>
                </div>
            `,
            freelance: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">Freelance</h2>
                    <div class="space-y-4">
                        ${modules.jobs.map(j => `
                            <div class="glass p-6 rounded-3xl border border-white/5 btn-press" onclick="ui.notify('Applied to: ${j.title}')">
                                <h4 class="font-bold text-sm mb-2">${j.title}</h4>
                                <div class="flex justify-between items-center mb-4">
                                    <p class="text-premium-accent font-bold text-xs">${j.budget.toLocaleString()} Kz</p>
                                    <p class="text-[10px] text-gray-500">${j.proposals} proposals</p>
                                </div>
                                <button class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-bold">Apply</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            travel: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">Travel</h2>
                    <div class="glass p-6 rounded-3xl mb-6 space-y-4">
                        <div class="flex gap-2">
                            <button class="flex-1 py-2 bg-premium-accent text-white rounded-xl text-xs font-bold">Flights</button>
                            <button class="flex-1 py-2 bg-white/5 rounded-xl text-xs font-bold">Hotels</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${modules.flights.map(f => `
                            <div class="glass p-5 rounded-3xl border border-white/5 btn-press" onclick="actions.buy(1)">
                                <div class="flex justify-between items-center">
                                    <div><p class="font-bold text-sm">${f.from} → ${f.to}</p><p class="text-[10px] text-gray-500">${f.time}</p></div>
                                    <p class="text-premium-accent font-bold">${f.price.toLocaleString()} Kz</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,
            bills: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">Bills & Payments</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        ${['ENDE', 'EPAL', 'ZAP', 'UNITEL'].map(u => `
                            <button class="glass p-8 rounded-3xl flex flex-col items-center gap-3 btn-press" onclick="ui.notify('${u} selected')">
                                <div class="w-14 h-14 bg-premium-accent rounded-2xl flex items-center justify-center"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                                <span class="font-bold text-xs">${u}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `,
            clothing: () => `
                <div class="px-6 py-4 animate-fade-in">
                    <h2 class="text-2xl font-display font-bold mb-6">Fashion</h2>
                    <div class="grid grid-cols-2 gap-4">
                        ${[1,2,3,4].map(i => `
                            <div class="glass rounded-3xl overflow-hidden border border-white/5 btn-press" onclick="actions.buy(${i})">
                                <img src="https://picsum.photos/seed/fashion${i}/400/500" class="w-full h-40 object-cover">
                                <div class="p-3"><h4 class="text-xs font-bold">Collection ${i}</h4><p class="text-premium-accent font-bold text-xs mt-1">${(15000 + i*5000).toLocaleString()} Kz</p></div>
                            </div>
                        `).join('')}
                    </div>

        };

        // --- Render ---
        const render = () => {
            const main = document.getElementById('main-content');
            main.innerHTML = (Views[state.view] || Views.home)();
            
            // Update Nav Labels
            document.querySelectorAll('.nav-label').forEach(el => {
                el.innerText = i18n[state.lang][el.dataset.key];
            });

            // Update Nav Active State
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active-nav', el.dataset.path === state.view);
                el.classList.toggle('text-gray-500', el.dataset.path !== state.view);
            });

            lucide.createIcons();
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            // Splash sequence
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('app');
                splash.style.opacity = '0';
                app.style.opacity = '1';
                setTimeout(() => splash.style.visibility = 'hidden', 800);
            }, 2500);

            render();
            document.getElementById('theme-toggle').addEventListener('click', ui.toggleTheme);
            document.getElementById('lang-toggle').addEventListener('click', ui.toggleLang);
        });
    </script>
</body>
</html>
