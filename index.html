<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKA Global v3.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#070a14;color:#fff;}
nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#000;padding:10px;z-index:10}
nav button{background:none;border:none;color:#aaa;font-size:12px}
.container{padding:15px;padding-bottom:90px}
.hidden{display:none}
.card{background:#121826;padding:12px;border-radius:12px;margin-bottom:10px;border:1px solid #1f2937}
.btn{width:100%;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,#00f0ff,#8b5cf6);color:#000;font-weight:bold}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none;background:#111;color:#fff}
video{width:100%;border-radius:12px}
.badge{padding:3px 8px;border-radius:20px;font-size:11px}
</style>
</head>

<body>

<div class="container">

<div id="feed">
<h2>🔥 Feed</h2>
<div id="feedList"></div>
</div>

<div id="market" class="hidden"></div>

<div id="kyc" class="hidden">
<h2>KYC Verification</h2>
<input id="name" placeholder="Full name">
<input id="bi" placeholder="BI Number">
<button class="btn" onclick="kyc()">Submit KYC</button>
</div>

<div id="wallet" class="hidden">
<h2>Wallet</h2>
<p>Balance: <span id="bal"></span></p>
<button class="btn" onclick="addFunds()">Add Test Funds</button>
</div>

<div id="creator" class="hidden">
<h2>Create Video</h2>
<input id="creatorName" placeholder="Creator name">
<input id="videoUrl" placeholder="Video URL">
<button class="btn" onclick="publish()">Publish</button>
</div>

<div id="leaderboard" class="hidden">
<h2>🏆 Trending</h2>
<div id="trend"></div>
<h2>Creators</h2>
<div id="creators"></div>
</div>

</div>

<nav>
<button onclick="nav('feed')">Feed</button>
<button onclick="nav('market')">Market</button>
<button onclick="nav('kyc')">KYC</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('creator')">Create</button>
<button onclick="nav('leaderboard')">🔥</button>
</nav>

<script>

// ================= STATE =================
let db = JSON.parse(localStorage.getItem("marka")) || {
user:{balance:500,kyc:"none",strikes:0},
ledger:[],
feed:[
{video:"https://www.w3schools.com/html/mov_bbb.mp4",likes:5,comments:[],creator:"Alex",views:0},
{video:"https://www.w3schools.com/html/movie.mp4",likes:3,comments:[],creator:"Maria",views:0}
],
queue:[]
};

function save(){localStorage.setItem("marka",JSON.stringify(db));}

// ================= BACKEND SIMULATION =================
const API = {
request(type,data){
return new Promise(res=>{
setTimeout(()=>{
if(type==="PAY"){
res(Backend.pay(data));
}
if(type==="KYC"){
res(Backend.kyc(data));
}
},800+Math.random()*800);
});
}
};

const Backend = {

pay(order){

let platform = order.amount*0.15;
let seller = order.amount*0.85;

db.user.balance -= order.amount;

db.ledger.push({
id:crypto.randomUUID(),
split:{platform,seller},
time:Date.now()
});

save();
return {ok:true};
},

kyc(data){
if(data.bi && data.bi.length>=8){
db.user.kyc="KYC1";
save();
return {ok:true};
}
return {ok:false};
}

};

// ================= NAV =================
function nav(p){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');

if(p==="feed") renderFeed();
if(p==="wallet") updateWallet();
if(p==="leaderboard") renderBoard();
if(p==="market") renderMarket();
}

// ================= FEED =================
function renderFeed(){
let el=document.getElementById("feedList");
el.innerHTML="";

db.feed.sort((a,b)=>b.likes-a.likes).forEach((v,i)=>{
el.innerHTML+=`
<div class="card">
<video src="${v.video}" controls></video>
<p>${v.creator}</p>
<button class="btn" onclick="like(${i})">❤️ ${v.likes}</button>
<button class="btn" onclick="comment(${i})">💬</button>
</div>
`;
});
}

function like(i){
db.feed[i].likes++;
save();
renderFeed();
}

function comment(i){
db.feed[i].comments.push("ok");
save();
}

// ================= CREATOR =================
function publish(){
let name=document.getElementById("creatorName").value;
let url=document.getElementById("videoUrl").value;

db.feed.push({video:url,creator:name,likes:0,comments:[],views:0});

save();
alert("Published");
}

// ================= MARKET =================
let products=[
{name:"Food",price:5000},
{name:"Freelance",price:100000}
];

function renderMarket(){
let el=document.getElementById("market");
el.innerHTML="<h2>Market</h2>";

products.forEach((p,i)=>{
el.innerHTML+=`
<div class="card">
<p>${p.name}</p>
<p>${p.price}</p>
<button class="btn" onclick="buy(${i})">Buy</button>
</div>
`;
});
}

async function buy(i){
let p=products[i];

let res = await API.request("PAY",{amount:p.price});

if(res.ok){
alert("Paid via backend simulation");
}
}

// ================= KYC =================
async function kyc(){
let name=document.getElementById("name").value;
let bi=document.getElementById("bi").value;

let res=await API.request("KYC",{name,bi});

if(res.ok){
alert("KYC Approved");
}else{
alert("Rejected");
}
}

// ================= WALLET =================
function updateWallet(){
document.getElementById("bal").innerText=db.user.balance;
}

function addFunds(){
db.user.balance+=100;
save();
updateWallet();
}

// ================= LEADERBOARD =================
function renderBoard(){

let el=document.getElementById("trend");
el.innerHTML="";

let sorted=[...db.feed].sort((a,b)=>b.likes-a.likes);

sorted.slice(0,3).forEach(v=>{
el.innerHTML+=`<div class="card">${v.creator} ❤️ ${v.likes}</div>`;
});

}

// ================= INIT =================
renderFeed();

</script>

</body>
 </html>
