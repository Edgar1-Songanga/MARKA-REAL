<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKA </title>

<style>
:root{--bg:#0a0a0a;--card:#171717;--text:#fff;--accent:#3B82F6}
.light{--bg:#f5f5f5;--card:#fff;--text:#000}
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text)}
nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:var(--card);padding:10px}
nav button{background:none;border:none;color:var(--text);font-size:12px}
.container{padding:15px;padding-bottom:90px}
.card{background:var(--card);padding:12px;border-radius:12px;margin-bottom:10px}
.btn{width:100%;padding:10px;border:none;border-radius:10px;background:var(--accent);color:#fff;margin-top:8px}
.hidden{display:none}
input{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none;background:#111;color:#fff}
.light input{background:#eee;color:#000}
.badge{padding:3px 8px;border-radius:20px;font-size:11px}
.green{background:#16a34a}.yellow{background:#eab308}.red{background:#ef4444}
</style>
</head>

<body>

<div class="container">

<div id="feed"></div>
<div id="market" class="hidden"></div>
<div id="users" class="hidden"></div>

<div id="kyc" class="hidden">
<h3>KYC</h3>
<input id="bi" placeholder="BI">
<button class="btn" onclick="kyc()">Submit</button>
</div>

<div id="wallet" class="hidden">
<h3 id="walletTitle"></h3>
<p id="balance"></p>
<button class="btn" onclick="addFunds()">+100</button>
</div>

<div id="settings" class="hidden">
<select onchange="setLang(this.value)">
<option value="en">EN</option>
<option value="pt">PT</option>
<option value="os">OS</option>
</select>
<button class="btn" onclick="toggleTheme()">Theme</button>
</div>

<div id="admin" class="hidden">
<h3>ADMIN PANEL</h3>
<div id="queue"></div>
</div>

</div>

<nav>
<button onclick="nav('feed')">Feed</button>
<button onclick="nav('market')">Market</button>
<button onclick="nav('users')">Users</button>
<button onclick="nav('kyc')">KYC</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('settings')">⚙</button>
</nav>

<script>

// ================= DB =================
let db = JSON.parse(localStorage.getItem("marka")) || {
user:{balance:500,kyc:"none",strikes:0,lang:"en",theme:"dark"},
ledger:[],
queue:[],
feed:[
{video:"https://www.w3schools.com/html/mov_bbb.mp4",likes:3,creator:"Alex"},
{video:"https://www.w3schools.com/html/movie.mp4",likes:2,creator:"Maria"}
],
users:[],
products:[]
};

// ================= INIT USERS =================
if(db.users.length===0){
db.users=[
{id:"u1",name:"Carlos Mendes",role:"buyer",headline:"Empresário",tier:"Gold",kyc:"KYC2"},
{id:"u2",name:"Ana Silva",role:"seller",headline:"Moda Luanda",tier:"Silver",kyc:"KYC2"},
{id:"u3",name:"João UX",role:"freelancer",headline:"UI/UX Designer",tier:"Elite",kyc:"KYC2",skills:["Figma","UX"]},
{id:"u4",name:"ImoPrime",role:"seller",headline:"Imobiliária",tier:"Gold",kyc:"KYB"}
];
}

// ================= INIT PRODUCTS =================
if(db.products.length===0){
db.products=[
{id:"p1",type:"food",name:"Pizza",price:5000,sellerId:"u2"},
{id:"p2",type:"car",name:"Land Cruiser",price:25000000,sellerId:"u4"},
{id:"p3",type:"realestate",name:"T3 Talatona",price:85000000,sellerId:"u4"},
{id:"p4",type:"freelance",name:"UI Design",price:120000,sellerId:"u3"},
{id:"p5",type:"service",name:"Consultoria",price:50000,sellerId:"u3"}
];
}

function save(){localStorage.setItem("marka",JSON.stringify(db));}

// ================= LANG =================
const LANG={
en:{wallet:"Wallet",kyc:"Approved"},
pt:{wallet:"Carteira",kyc:"Aprovado"},
os:{wallet:"Omboloto",kyc:"Yatya"}
};
function t(k){return LANG[db.user.lang][k]||k;}
function setLang(l){db.user.lang=l;save();updateWallet();}

// ================= THEME =================
function toggleTheme(){
document.body.classList.toggle("light");
db.user.theme=document.body.classList.contains("light")?"light":"dark";
save();
}

// ================= NAV =================
function nav(id){
if(id==="admin"){
let pass=prompt("Password");
if(pass!=="marka2026"){alert("Denied");return;}
}
document.querySelectorAll('.container>div').forEach(d=>d.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');

if(id==="feed")renderFeed();
if(id==="market")renderMarket();
if(id==="wallet")updateWallet();
if(id==="users")renderUsers();
if(id==="admin")renderQueue();
}

// ================= USER CARD =================
function getUser(id){return db.users.find(u=>u.id===id);}

function userCard(u){
let badge=u.kyc==="KYC2"?"green":u.kyc==="KYC1"?"yellow":"red";
return `
<div class="card">
<h4>${u.name} <span class="badge ${badge}">${u.kyc}</span></h4>
<p>${u.headline}</p>
<p>Tier: ${u.tier}</p>
${u.skills?`<p>${u.skills.join(", ")}</p>`:""}
</div>`;
}

// ================= USERS =================
function renderUsers(){
let el=document.getElementById("users");
el.innerHTML="<h3>Perfis</h3>";
db.users.forEach(u=>{el.innerHTML+=userCard(u);});
}

// ================= FEED =================
function renderFeed(){
let el=document.getElementById("feed");
el.innerHTML="<h3>Feed</h3>";

db.feed.forEach((v,i)=>{
el.innerHTML+=`
<div class="card">
<video src="${v.video}" controls></video>
<p>${v.creator}</p>
<button class="btn" onclick="like(${i})">❤️ ${v.likes}</button>
<button class="btn" onclick="comment(${i})">💬</button>
</div>`;
});
}

function like(i){db.feed[i].likes++;save();renderFeed();}

function comment(i){
let msg=prompt("Comment");
if(fraudCheck(msg)){alert("Blocked");return;}
db.feed[i].comments=(db.feed[i].comments||[]);
db.feed[i].comments.push(msg);
save();
}

// ================= FRAUD =================
function fraudCheck(msg){
if(!msg)return false;
let patterns=[/\d{9,}/,/@/,/whatsapp/i,/telegram/i,/http/i];
for(let p of patterns){
if(p.test(msg)){
db.user.strikes++;
db.queue.push({type:"LEAK",msg,status:"AI_REVIEW"});
save();
return true;
}
}
return false;
}

// ================= MARKET =================
function renderMarket(){
let el=document.getElementById("market");
el.innerHTML="<h3>Marketplace</h3>";

db.products.forEach((p,i)=>{
let seller=getUser(p.sellerId);

el.innerHTML+=`
<div class="card">
<h4>${p.name}</h4>
<p>${p.price} Kz</p>
<p>${p.type}</p>
${userCard(seller)}
<button class="btn" onclick="buy(${i})">Comprar</button>
</div>`;
});
}

// ================= PAYMENT =================
async function buy(i){
let p=db.products[i];
await new Promise(r=>setTimeout(r,600));

let platform=p.price*0.15;
let seller=p.price*0.85;

db.user.balance-=p.price;

db.ledger.push({
txId:crypto.randomUUID(),
split:{platform,seller},
time:Date.now()
});

save();
alert("Pagamento feito (escrow simulado)");
}

// ================= KYC =================
function kyc(){
let bi=document.getElementById("bi").value;
if(bi.length<6){alert("Invalid");return;}
db.user.kyc="KYC1";
save();
alert(t("kyc"));
}

// ================= WALLET =================
function updateWallet(){
document.getElementById("walletTitle").innerText=t("wallet");
document.getElementById("balance").innerText=db.user.balance+" Kz";
}
function addFunds(){db.user.balance+=100;save();updateWallet();}

// ================= ADMIN =================
function renderQueue(){
let el=document.getElementById("queue");
el.innerHTML="";
db.queue.forEach(q=>{
el.innerHTML+=`<div class="card"><p>${q.type}</p><p>${q.msg}</p></div>`;
});
}

// ================= INIT =================
renderFeed();
updateWallet();
if(db.user.theme==="light")document.body.classList.add("light");

</script>

</body>
</html>
